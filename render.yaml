services:
  - type: web
    name: zypher-ml-service
    env: python
    buildCommand: |
      cd python-ml-service
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: |
      cd python-ml-service
      gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: API_KEY
        sync: false # OpenWeatherMap Key
      - key: OPENAI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.12 # Prophet works best on 3.10+